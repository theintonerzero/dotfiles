# ------------------------------------------------------------
# prefix
# ------------------------------------------------------------

# Change the default prefix from Ctrl-b to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ------------------------------------------------------------
# general behavior
# ------------------------------------------------------------

# Enable mouse support for pane selection and scrolling
set -g mouse on

# Start windows and panes counting from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows after one is closed
set -g renumber-windows on

# Increase scrollback history
set -g history-limit 100000

# Faster escape sequence handling
set -sg escape-time 10

# Theme pane borders
set -g pane-border-style "fg=#2a2a2f"
set -g pane-active-border-style "fg=#c4c4cc"

# Theme copy-mode and messages
set -g mode-style "fg=#101014,bg=#f28bb7"
set -g message-style "fg=#101014,bg=#c4c4cc"
set -g message-command-style "fg=#101014,bg=#c4c4cc"

# ------------------------------------------------------------
# splits
# ------------------------------------------------------------

# More intuitive split keys
unbind '"'
unbind %

bind | split-window -h
bind - split-window -v

# Open new panes in the current pane's directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ------------------------------------------------------------
# pane navigation
# ------------------------------------------------------------

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ------------------------------------------------------------
# reload config
# ------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# ------------------------------------------------------------
# status bar
# ------------------------------------------------------------

set -g status-position bottom
set -g status-interval 5
set -g status-left-length 50
set -g status-right-length 90
set -g status-style "fg=#c4c4cc,bg=#101014"

set -g status-left "#[fg=#f3f3f5,bg=#2a2a2f,bold] #S #[fg=#2a2a2f,bg=#101014,nobold]"
set -g status-right "#{?client_prefix,#[fg=#101014,bg=#c1121f,bold] PREFIX #[fg=#c1121f,bg=#101014],}#[fg=#2a2a2f,bg=#101014]#[fg=#f3f3f5,bg=#2a2a2f] #(whoami) #[fg=#f28bb7,bg=#2a2a2f]#[fg=#fbe3ee,bg=#f28bb7,bold] %Y-%m-%d %H:%M "

setw -g window-status-separator ""
setw -g window-status-format " #[fg=#6e6e76]#I:#W "
setw -g window-status-current-format " #[fg=#101014,bg=#f28bb7,bold]#I:#W "

# ------------------------------------------------------------
# terminal colors
# ------------------------------------------------------------

# Enable true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
